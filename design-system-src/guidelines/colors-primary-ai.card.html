<!-- @dsCard group="Colors" viewport="700x130" subtitle="Indigo-blue = user actions · Violet = AI only" name="Primary & AI accent" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="lab">--primary</div></div>
<div class="sw"><div class="chip" style="background:var(--primary-hover)"></div><div class="lab">--primary-hover</div></div>
<div class="sw"><div class="chip" style="background:var(--primary-tint)"></div><div class="lab">--primary-tint</div></div>
<div class="sw"><div class="chip" style="background:var(--primary-border)"></div><div class="lab">--primary-border</div></div>
<div class="sw"><div class="chip" style="background:var(--ai)"></div><div class="lab">--ai</div></div>
<div class="sw"><div class="chip" style="background:var(--ai-hover)"></div><div class="lab">--ai-hover</div></div>
<div class="sw"><div class="chip" style="background:var(--ai-tint)"></div><div class="lab">--ai-tint</div></div>
<div class="sw"><div class="chip" style="background:var(--ai-border)"></div><div class="lab">--ai-border</div></div>
</div></body></html>
