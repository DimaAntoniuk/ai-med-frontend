<!-- @dsCard group="Brand" viewport="700x170" subtitle="The violet accent means one thing: AI produced this" name="AI accent usage" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body>
<div style="display:flex;gap:16px;width:100%">
<div style="flex:1;border:1px solid var(--success-border);border-radius:var(--r-lg);padding:14px;background:var(--surface-card)">
<div class="lab" style="color:var(--success);font-weight:600">DO</div>
<div style="font-size:var(--text-sm);color:var(--text-secondary);margin-top:6px;line-height:1.5">Violet on AI badges, AI message surfaces, citation chips, confidence meters, “drafted by MedAI” labels.</div>
</div>
<div style="flex:1;border:1px solid var(--critical-border);border-radius:var(--r-lg);padding:14px;background:var(--surface-card)">
<div class="lab" style="color:var(--critical);font-weight:600">DON'T</div>
<div style="font-size:var(--text-sm);color:var(--text-secondary);margin-top:6px;line-height:1.5">Never violet for human actions, decoration, gradients, or emphasis. A clinician must be able to trust: violet = machine-generated, review before acting.</div>
</div>
</div></body></html>
