<!-- @dsCard group="Colors" viewport="700x130" subtitle="Cool slate-tinted neutral ramp" name="Neutrals" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--n-white)"></div><div class="lab">--n-white</div></div>
<div class="sw"><div class="chip" style="background:var(--n-50)"></div><div class="lab">--n-50</div></div>
<div class="sw"><div class="chip" style="background:var(--n-100)"></div><div class="lab">--n-100</div></div>
<div class="sw"><div class="chip" style="background:var(--n-200)"></div><div class="lab">--n-200</div></div>
<div class="sw"><div class="chip" style="background:var(--n-300)"></div><div class="lab">--n-300</div></div>
<div class="sw"><div class="chip" style="background:var(--n-400)"></div><div class="lab">--n-400</div></div>
<div class="sw"><div class="chip" style="background:var(--n-500)"></div><div class="lab">--n-500</div></div>
<div class="sw"><div class="chip" style="background:var(--n-600)"></div><div class="lab">--n-600</div></div>
<div class="sw"><div class="chip" style="background:var(--n-700)"></div><div class="lab">--n-700</div></div>
<div class="sw"><div class="chip" style="background:var(--n-900)"></div><div class="lab">--n-900</div></div>
</div></body></html>
