<!-- @dsCard group="Colors" viewport="700x120" subtitle="Patient acuity / risk scale — pill treatment" name="Acuity scale" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body>
<div style="display:flex;gap:12px;align-items:center;width:100%">

<span style="display:inline-flex;align-items:center;gap:6px;background:var(--acuity-low-tint);color:var(--acuity-low);border:1px solid color-mix(in oklch, var(--acuity-low) 30%, white);border-radius:var(--r-full);padding:4px 12px;font-size:var(--text-sm);font-weight:var(--weight-semibold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--acuity-low)"></span>Low acuity</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:var(--acuity-moderate-tint);color:var(--acuity-moderate);border:1px solid color-mix(in oklch, var(--acuity-moderate) 30%, white);border-radius:var(--r-full);padding:4px 12px;font-size:var(--text-sm);font-weight:var(--weight-semibold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--acuity-moderate)"></span>Moderate acuity</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:var(--acuity-high-tint);color:var(--acuity-high);border:1px solid color-mix(in oklch, var(--acuity-high) 30%, white);border-radius:var(--r-full);padding:4px 12px;font-size:var(--text-sm);font-weight:var(--weight-semibold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--acuity-high)"></span>High acuity</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:var(--acuity-critical-tint);color:var(--acuity-critical);border:1px solid color-mix(in oklch, var(--acuity-critical) 30%, white);border-radius:var(--r-full);padding:4px 12px;font-size:var(--text-sm);font-weight:var(--weight-semibold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--acuity-critical)"></span>Critical acuity</span>
</div></body></html>
