<!-- @dsCard group="Colors" viewport="700x130" subtitle="AI confidence indicators — dot meter + label" name="AI confidence" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body>
<div style="display:flex;gap:16px;align-items:center;width:100%">

<span style="display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border-subtle);background:var(--surface-card);border-radius:var(--r-full);padding:5px 12px;font-size:var(--text-sm);color:var(--text-secondary)">
<span style="display:inline-flex;gap:3px"><span style="width:6px;height:12px;border-radius:2px;background:var(--conf-high)"></span><span style="width:6px;height:12px;border-radius:2px;background:var(--conf-high)"></span><span style="width:6px;height:12px;border-radius:2px;background:var(--conf-high)"></span></span>
<b style="color:var(--text-primary);font-weight:var(--weight-semibold)">High confidence</b></span>
<span style="display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border-subtle);background:var(--surface-card);border-radius:var(--r-full);padding:5px 12px;font-size:var(--text-sm);color:var(--text-secondary)">
<span style="display:inline-flex;gap:3px"><span style="width:6px;height:12px;border-radius:2px;background:var(--conf-medium)"></span><span style="width:6px;height:12px;border-radius:2px;background:var(--conf-medium)"></span><span style="width:6px;height:12px;border-radius:2px;background:var(--n-200)"></span></span>
<b style="color:var(--text-primary);font-weight:var(--weight-semibold)">Medium confidence</b></span>
<span style="display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border-subtle);background:var(--surface-card);border-radius:var(--r-full);padding:5px 12px;font-size:var(--text-sm);color:var(--text-secondary)">
<span style="display:inline-flex;gap:3px"><span style="width:6px;height:12px;border-radius:2px;background:var(--conf-low)"></span><span style="width:6px;height:12px;border-radius:2px;background:var(--n-200)"></span><span style="width:6px;height:12px;border-radius:2px;background:var(--n-200)"></span></span>
<b style="color:var(--text-primary);font-weight:var(--weight-semibold)">Low confidence — verify</b></span>
</div></body></html>
