<!-- @dsCard group="Colors" viewport="700x130" subtitle="Success · Warning · Critical · Info, each with tint + border" name="Semantic" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--success)"></div><div class="lab">--success</div></div>
<div class="sw"><div class="chip" style="background:var(--success-tint)"></div><div class="lab">--success-tint</div></div>
<div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="lab">--warning</div></div>
<div class="sw"><div class="chip" style="background:var(--warning-tint)"></div><div class="lab">--warning-tint</div></div>
<div class="sw"><div class="chip" style="background:var(--critical)"></div><div class="lab">--critical</div></div>
<div class="sw"><div class="chip" style="background:var(--critical-tint)"></div><div class="lab">--critical-tint</div></div>
<div class="sw"><div class="chip" style="background:var(--info)"></div><div class="lab">--info</div></div>
<div class="sw"><div class="chip" style="background:var(--info-tint)"></div><div class="lab">--info-tint</div></div>
</div></body></html>
