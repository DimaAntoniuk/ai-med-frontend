<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{background:#fff;display:flex;align-items:center;padding:20px;gap:0}.row{display:flex;gap:10px;width:100%}.sw{flex:1;display:flex;flex-direction:column;gap:6px}.chip{height:56px;border-radius:8px;border:1px solid var(--border-subtle)}.lab{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}</style></head><body>
<div style="display:flex;gap:24px;align-items:center;width:100%">
<div style="flex:1;display:flex;flex-direction:column;gap:8px;align-items:center"><div style="width:100%;height:36px;border-radius:var(--r-md);background:#fff;border:1.5px solid var(--primary);box-shadow:var(--ring)"></div><div class="lab">Default focus</div></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;align-items:center"><div style="width:100%;height:36px;border-radius:var(--r-md);background:#fff;border:1.5px solid var(--ai);box-shadow:var(--ring-ai)"></div><div class="lab">AI element focus</div></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;align-items:center"><div style="width:100%;height:36px;border-radius:var(--r-md);background:#fff;border:1.5px solid var(--critical);box-shadow:var(--ring-critical)"></div><div class="lab">Destructive focus</div></div>
</div></body></html>
